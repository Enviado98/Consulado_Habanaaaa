<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moon Art Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #05060f;
      font-family: 'Tenor Sans', sans-serif;
      cursor: default;
    }

    /* ── Background ── */
    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: none;
      will-change: transform;
    }

    /* Dark gradient layers */
    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to right, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.05) 100%),
        linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
      z-index: 1;
    }

    /* ── Slide counter ── */
    .counter {
      position: absolute;
      top: 2.2rem;
      right: 2.5rem;
      z-index: 3;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
    }
    .counter span {
      color: rgba(255,255,255,0.85);
    }

    /* ── Left content ── */
    .content {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      color: white;
      max-width: 320px;
    }

    .content .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.8rem;
    }

    .content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 4.5vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .content .desc {
      margin-top: 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    .see-more {
      margin-top: 1.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.3rem 0.55rem 1rem;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      color: white;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }
    .see-more:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.7);
    }
    .see-more::after {
      content: '→';
      font-size: 0.9rem;
    }

    /* ── Cards strip ── */
    .cards-wrap {
      position: absolute;
      right: 2.5%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card {
      width: 115px;
      height: 165px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 14px 50px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.06);
    }

    /* Subtle shimmer on card */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Nav buttons ── */
    .nav {
      position: absolute;
      bottom: 7%;
      left: 5%;
      z-index: 3;
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.7);
      color: white;
    }

    .nav-btn:active {
      transform: scale(0.93);
    }

    /* ── Progress line ── */
    .progress-bar {
      position: absolute;
      bottom: 7%;
      left: calc(5% + 110px);
      right: 5%;
      height: 1px;
      background: rgba(255,255,255,0.12);
      z-index: 3;
      display: flex;
      align-items: center;
    }

    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      transition: width 0.6s ease;
    }

    /* ── Expanding card (JS controlled) ── */
    .expanding {
      position: fixed;
      border-radius: 14px;
      overflow: hidden;
      z-index: 20;
      pointer-events: none;
    }
    .expanding img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div class="vignette"></div>

<div class="counter"><span id="curNum">01</span> / <span id="totalNum">06</span></div>

<div class="content" id="content">
  <p class="eyebrow">Art Gallery</p>
  <h1 id="slideTitle">EXPLORE<br>MOON ART</h1>
  <p class="desc" id="slideDesc">A curated journey through surreal cosmic landscapes.</p>
  <button class="see-more">See more</button>
</div>

<div class="cards-wrap" id="cardsWrap"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn">&#8592;</button>
  <button class="nav-btn" id="nextBtn">&#8594;</button>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
const slides = [
  {
    url: 'https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1920&q=85',
    title: 'EXPLORE<br>MOON ART',
    desc: 'A curated journey through surreal cosmic landscapes.',
    label: 'Deep Space'
  },
  {
    url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=85',
    title: 'STARLIT<br>PEAKS',
    desc: 'Where ancient mountains pierce the veil of the Milky Way.',
    label: 'Starlit Peaks'
  },
  {
    url: 'https://images.unsplash.com/photo-1532798442725-0d0fdeb5c8cc?w=1920&q=85',
    title: 'MOUNTAIN<br>DREAMS',
    desc: 'Earth meets eternity on the edge of the world.',
    label: 'Mountain Dreams'
  },
  {
    url: 'https://images.unsplash.com/photo-1475274047050-1d0c0975864c?w=1920&q=85',
    title: 'COSMOS<br>LAKE',
    desc: 'Still waters mirror the infinite expanse above.',
    label: 'Cosmos Lake'
  },
  {
    url: 'https://images.unsplash.com/photo-1509773896068-7fd415d91e2e?w=1920&q=85',
    title: 'AURORA<br>NIGHT',
    desc: 'Electric curtains dance across the polar sky.',
    label: 'Aurora Night'
  },
  {
    url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=85',
    title: 'EDGE OF<br>INFINITY',
    desc: 'Standing at the threshold of the unknown.',
    label: 'Edge of Infinity'
  },
];

let current = 0;
let animating = false;
const TOTAL = slides.length;

const bgEl        = document.getElementById('bg');
const cardsWrap   = document.getElementById('cardsWrap');
const titleEl     = document.getElementById('slideTitle');
const descEl      = document.getElementById('slideDesc');
const curNumEl    = document.getElementById('curNum');
const progressEl  = document.getElementById('progressFill');
document.getElementById('totalNum').textContent = String(TOTAL).padStart(2, '0');

/* ── Helpers ── */
function pad(n) { return String(n + 1).padStart(2, '0'); }

function nextIdx(offset = 1) {
  return (current + offset + TOTAL) % TOTAL;
}

/* ── Render cards ── */
function renderCards(skipAnim = false) {
  cardsWrap.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const s = slides[nextIdx(i)];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.offset = i;
    card.innerHTML = `<img src="${s.url}" loading="lazy" alt="${s.label}">`;
    if (!skipAnim) {
      gsap.fromTo(card, { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.5, delay: (i - 1) * 0.07, ease: 'power2.out' });
    }
    cardsWrap.appendChild(card);
  }
}

/* ── Update text ── */
function updateText(slide) {
  gsap.to([titleEl, descEl], {
    opacity: 0, y: -8, duration: 0.28, ease: 'power1.in',
    onComplete: () => {
      titleEl.innerHTML = slide.title;
      descEl.textContent = slide.desc;
      gsap.to([titleEl, descEl], { opacity: 1, y: 0, duration: 0.45, stagger: 0.08, ease: 'power2.out' });
    }
  });
}

/* ── Update progress ── */
function updateProgress() {
  const pct = ((current + 1) / TOTAL) * 100;
  progressEl.style.width = pct + '%';
  curNumEl.textContent = pad(current);
}

/* ── Init ── */
function init() {
  bgEl.style.backgroundImage = `url('${slides[0].url}')`;
  renderCards(true);
  updateProgress();
}

/* ── Go next ── */
function goNext() {
  if (animating) return;
  animating = true;

  const firstCard = cardsWrap.children[0];
  if (!firstCard) { animating = false; return; }

  const rect   = firstCard.getBoundingClientRect();
  const next   = slides[nextIdx(1)];

  // Build an expanding clone
  const clone = document.createElement('div');
  clone.className = 'expanding';
  clone.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;`;
  clone.innerHTML = `<img src="${next.url}" alt="">`;
  document.body.appendChild(clone);

  // Fly cards out
  const cards = Array.from(cardsWrap.children);
  gsap.to(cards[0], { x: -160, opacity: 0, duration: 0.45, ease: 'power2.in' });
  gsap.to(cards[1], { x: -134, duration: 0.55, ease: 'power2.inOut' });
  gsap.to(cards[2], { x: -134, duration: 0.55, ease: 'power2.inOut', delay: 0.04 });

  // Expand clone to full screen
  gsap.to(clone, {
    left: 0, top: 0,
    width: window.innerWidth,
    height: window.innerHeight,
    borderRadius: 0,
    duration: 0.88,
    ease: 'power3.inOut',
    onComplete: () => {
      current = nextIdx(1);
      bgEl.style.backgroundImage = `url('${next.url}')`;
      clone.remove();
      updateText(next);
      renderCards();
      updateProgress();
      animating = false;
    }
  });
}

/* ── Go prev ── */
function goPrev() {
  if (animating) return;
  animating = true;

  const prevIdx = (current - 1 + TOTAL) % TOTAL;
  const prev = slides[prevIdx];

  // Fade transition for prev
  const curtain = document.createElement('div');
  curtain.style.cssText = 'position:fixed;inset:0;background:#05060f;z-index:15;pointer-events:none;';
  document.body.appendChild(curtain);

  gsap.to(curtain, {
    opacity: 0, duration: 0.75, delay: 0.12, ease: 'power2.out',
    onComplete: () => { curtain.remove(); animating = false; }
  });

  // Slide cards from left
  const cards = Array.from(cardsWrap.children);
  gsap.to(cards, { x: 80, opacity: 0, duration: 0.25, stagger: 0.04, ease: 'power1.in',
    onComplete: () => {
      current = prevIdx;
      bgEl.style.backgroundImage = `url('${prev.url}')`;
      updateText(prev);
      renderCards();
      updateProgress();
    }
  });
}

/* ── Events ── */
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});

// Click on card to jump to it
cardsWrap.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card || animating) return;
  const offset = parseInt(card.dataset.offset);
  if (offset === 1) goNext();
});

// Touch / swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? goNext() : goPrev();
}, { passive: true });

init();
</script>
</body>
</html>
